server:
  port: 8085

spring:
  application:
    name: zhangyi
  datasource:
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/zhangyi?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: root
      password: 123456

  redis:
    host: localhost
    port: 6379
    password:
    database: 1
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0
      timeout: 2000  # 连接超时时间

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: org.lx.pojo
  configuration:
    #在映射实体或者属性时，将数据库中表名和字段名中的下划线去掉，按照驼峰命名法映射
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  # JWT 存储的请求头
  tokenHeader: Authorization
  # JWT 密钥
  secret: zhangyi-secret
  # JWT 超限时间 60 * 60 * 24
  expiration: 86400
  # JWT 30 * 24 * 60 * 60L;
  rememberMeExpiration: 2592000
  # JWT 负载中拿到的开头
  tokenHead: Bearer

# 验证码配置
kaptcha:
  border: 'yes'
  border.color: "105,179,90"
  textproducer:
    font:
      color: blue
      size: 30
    char:
      length: 4
  image:
    width: 100
    height: 40

# 验证码配置
captcha:
  expire-time: 300           # 验证码过期时间（秒），默认5分钟
  fail-limit: 5              # 失败次数限制
  fail-expire-time: 600      # 失败计数过期时间（秒），默认10分钟
  width: 120                 # 验证码图片宽度
  height: 40                 # 验证码图片高度
  length: 4                  # 验证码字符长度